<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<title>لوحة أدوات يوسف</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<h1>لوحة أدوات تحليل الشبكة</h1>

<div class="tool">

<h3>تحليل IP</h3>

<input id="ipInput" placeholder="ادخل IP">

<button onclick="scanIP()">تحليل</button>

<p id="ipResult"></p>

</div>

<div class="tool">

<h3>تحديد موقع الاتصال</h3>

<button onclick="locateIP()">تحديد الموقع</button>

<p id="locationResult"></p>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="script.js"></script>

</body>
</html>
